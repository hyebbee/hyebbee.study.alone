                        { label: '차량부품 (열관리/엔진)', ratio: 75, bg: 'rgb(13, 148, 136)' },   // teal-600
                        { label: '특수/방산 (K2/K9 등)', ratio: 25, bg: 'rgba(13, 148, 136, 0.5)' }
                        // 공작기계는 25년 매각 완료로 제외됨
                    ],
                    cashCow: '전통 엔진 및 등속조인트 부품, 그리고 최근 호실적을 견인 중인 K-방산(K2 전차, K9 자주포) 무장 체계.',
                    future: 'EV 통합 열관리 시스템(ITMS), 스마트 팩토리용 자율주행 물류 로봇(AMR) 및 데이터센터 서버 냉각(액침 냉각) 시스템.',
                    moat: '오랜 공작기계/방산 부품 가공 노하우를 바탕으로 한 <b class="text-teal-300">초정밀 모터 제어 및 하드웨어 가공 능력</b>. 이를 바탕으로 냉각수 분배부터 실내 공조, 배터리 온도를 하나로 통합 제어하는 독자적 ITMS 설계 역량 확보.'
                },
                competitiveness: [
                    { icon: '🌡️', title: '통합 열관리 및 하이브리드', desc: '하이브리드 부품 선점 및 통합 열관리 시스템(ITMS) 양산 개발 완료.' },
                    { icon: '🤖', title: '로봇/데이터센터 확장', desc: '물류 로봇과 데이터센터 열관리 분야로의 강력한 딥테크 업사이드 잠재력 확보.' },
                    { icon: '🛡️', title: 'Physical AI 자본 집중', desc: '사업 매각 대금과 방산 호실적 현금을 로보틱스 및 모빌리티 딥테크에 집중 투자.' }
                ],
                timeline: [
                    { date: '2024-2025', text: '방산 역대 최대 수주잔고 달성 및 25년 7월 공작기계 사업부 매각 완료.' },
                    { date: '2026 상반기', text: '멕시코 공장 가동률 상승을 통한 이익 기여. 차세대 열관리 모듈 양산 본격화.' },
                    { date: '2026-2028', text: 'Physical AI와 로보틱스에 대규모 투자를 집행하는 새로운 전략적 퀀텀 점프 구간.' }
                ],
                strategy: {
                    outlook: '두 번째 전성기 개막 - 딥테크 밸류에이션',
                    points: [
                        '투자 포인트: 적자 사업 매각으로 실적 발목 완전 제거. 멕시코 가동률 회복이 실적 모멘텀 견인.', 
                        '리스크: 신규 열관리 시스템(ITMS) 양산 초기 수율 안정화 지연 및 기존 글로벌 부품사들과의 판가/수주 경쟁 심화.',
                        '추가 업사이드: 로봇의 타 산업(데이터센터 등) 공급 가시화 시 큰 폭의 주가 상승 여력.', 
                        '액션: 단순 내연기관 부품사라는 꼬리표(저PBR)를 떼고 딥테크 기업으로 시장 평가(Rating)가 달라지는 원년.'
                    ]
                }
            }
        };

        let currentChart = null;
        const colorMap = {
            blue: { border: 'rgb(37, 99, 235)', bg: 'rgba(37, 99, 235, 0.1)' },
            orange: { border: 'rgb(234, 88, 12)', bg: 'rgba(234, 88, 12, 0.1)' },
            teal: { border: 'rgb(13, 148, 136)', bg: 'rgba(13, 148, 136, 0.1)' }
        };

        function renderSectionIntro(title, desc) {
            return `
                <div class="mb-4 border-b border-stone-100 pb-3">
                    <h2 class="text-xl font-bold text-stone-800 mb-1">${title}</h2>
                    <p class="text-sm text-stone-500">${desc}</p>
                </div>
            `;
        }

        // 1. Header with Stock Widget
        function buildHeader(data) {
            return `
                <div class="mb-6 bg-white p-6 rounded-xl border border-stone-200 shadow-sm flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
                    <div class="flex-grow">
                        <div class="flex items-baseline gap-3 mb-2">
                            <h2 class="text-3xl font-extrabold text-stone-900">${data.name}</h2>
                            <span class="px-2 py-0.5 rounded text-xs font-mono font-bold bg-stone-200 text-stone-700">${data.ticker}</span>
                        </div>
                        <p class="text-md text-stone-600 max-w-3xl leading-relaxed">${data.summary}</p>
                    </div>
                    <div class="bg-stone-50 p-4 rounded-lg border border-stone-200 min-w-[220px] w-full md:w-auto text-center shadow-inner shrink-0">
                        <div class="text-[10px] font-bold text-stone-400 mb-1.5 uppercase tracking-widest">Investment Rating</div>
                        <div class="text-2xl font-black text-${data.theme}-600 mb-3 tracking-tight">${data.stock.rating}</div>
                        <div class="grid grid-cols-2 gap-y-2 gap-x-4 text-sm items-center">
                            <div class="text-right text-stone-500">현재가</div>
                            <div class="text-left font-bold text-stone-800">${data.stock.price}</div>
                            <div class="text-right text-stone-500">목표가</div>
                            <div class="text-left font-bold text-${data.theme}-700">${data.stock.target}</div>
                        </div>
                    </div>
                </div>
            `;
        }

        // 2. Financials
        function buildFinancials(data) {
            const bars = data.financials.utilization.map(item => `
                <div class="mb-2.5">
                    <div class="flex justify-between text-xs font-medium text-stone-700 mb-1">
                        <span>${item.label}</span>
                        <span>${item.rate}%</span>
                    </div>
                    <div class="w-full bg-stone-200 rounded-full h-1.5">
                        <div class="h-1.5 rounded-full bg-${data.theme}-500" style="width: ${item.rate}%"></div>
                    </div>
                </div>
            `).join('');

            return `
                <section class="bg-white rounded-xl shadow-sm border border-stone-200 p-6 mb-6">
                    ${renderSectionIntro('1. 재무 지표 및 2026.1Q Update', '과거 매출/이익 트렌드와 함께 최신 증권사 리포트에서 발췌한 단기 실적 관전 포인트를 확인합니다.')}
                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 items-start">
                        <div class="lg:col-span-2">
                            <div class="chart-container">
                                <canvas id="finChart"></canvas>
                            </div>
                        </div>
                        <div class="flex flex-col gap-4">
                            <div class="bg-${data.theme}-50 border-l-4 border-${data.theme}-500 p-4 rounded-r-lg">
                                <h4 class="font-bold text-${data.theme}-800 text-sm mb-1.5 flex items-center gap-1.5">
                                    <span class="text-base">📢</span> ${data.financials.q1Review.title}
                                </h4>
                                <p class="text-xs text-stone-700 leading-relaxed">${data.financials.q1Review.text}</p>
                            </div>
                            <div class="bg-stone-50 p-4 rounded-lg border border-stone-100 shadow-sm">
                                <h3 class="text-sm font-bold text-stone-800 mb-2">🏭 핵심 공장 가동률 점검</h3>
                                <p class="text-[11px] text-stone-500 mb-3 pb-2 border-b border-stone-200">${data.financials.productionText}</p>
                                ${bars}
                            </div>
                        </div>
                    </div>
                </section>
            `;
        }

        // 3. Value Chain
        function buildValueChain(data) {
            const positions = [{ id: 0, title: 'Upstream', desc: '광물/제련' }, { id: 1, title: 'Midstream', desc: '배터리/소재/부품' }, { id: 2, title: 'Downstream', desc: '완성차/모빌리티' }];
            const nodes = positions.map(pos => {
                const isActive = pos.id === data.valueChain.position;
                const stateClass = isActive ? `vc-card-active border-2 border-${data.theme}-400 bg-${data.theme}-50` : 'vc-card-inactive border border-stone-200 bg-white';
                const textClass = isActive ? `text-${data.theme}-700` : 'text-stone-700';
                return `
                    <div class="vc-card flex-1 rounded-lg p-3 text-center ${stateClass}">
                        <h4 class="font-bold ${textClass} text-sm mb-1">${pos.title}</h4>
                        <p class="text-[11px] text-stone-500 hidden sm:block">${pos.desc}</p>
                    </div>
                `;
            }).join('<div class="hidden md:flex text-stone-300 px-1 text-sm">▶</div>');

            const checks = data.valueChain.checklist.map(item => `<li class="flex items-start text-xs text-stone-700 mb-1.5"><span class="text-${data.theme}-500 mr-2 text-[10px] mt-0.5">■</span><span>${item}</span></li>`).join('');
            const statusDetailsHTML = data.valueChain.statusDetails.map(item => `
                <div class="mb-3.5 last:mb-0">
                    <h5 class="text-xs font-bold text-stone-800 flex items-start gap-1.5 mb-1"><span class="text-${data.theme}-500 mt-0.5">☑️</span> ${item.title}</h5>
                    <p class="text-[11.5px] text-stone-600 pl-5 leading-relaxed">${item.desc}</p>
                </div>
            `).join('');

            return `
                <section class="bg-white rounded-xl shadow-sm border border-stone-200 p-6 mb-6">
                    ${renderSectionIntro('2. 밸류체인 입지 & 핵심 지표 현황 진단', '해당 기업의 산업 내 위치를 파악하고, 핵심 점검 체크리스트를 바탕으로 현재 상황을 진단합니다.')}
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 items-stretch">
                        <div class="flex flex-col gap-4">
                            <div class="flex flex-col md:flex-row items-center justify-between mb-2 gap-2 md:gap-0">${nodes}</div>
                            <div class="bg-stone-50 rounded-lg p-4 border border-stone-200 h-full">
                                <h4 class="font-bold text-stone-800 mb-3 text-sm flex items-center gap-1.5"><span class="text-base">📋</span> 핵심 점검 체크리스트</h4>
                                <ul class="pl-1">${checks}</ul>
                            </div>
                        </div>
                        <div class="bg-${data.theme}-50 rounded-lg p-5 border border-${data.theme}-200 shadow-inner h-full flex flex-col">
                            <h4 class="font-bold text-${data.theme}-800 mb-2.5 text-sm flex items-center gap-2"><span class="text-lg">🔍</span> 현황 요약: ${data.valueChain.statusTitle}</h4>
                            <div class="border-b border-${data.theme}-200/60 mb-4"></div>
                            <div class="flex-grow flex flex-col justify-center">${statusDetailsHTML}</div>
                        </div>
                    </div>
                </section>
            `;
        }

        // 4. Business DNA & Moat (NEW)
        function buildBusinessDNA(data) {
            // Build the segmented progress bar
            const segmentHtml = data.businessDNA.segments.map(seg => `
                <div style="width: ${seg.ratio}%; background-color: ${seg.bg};" class="h-full border-r border-white last:border-0 relative group">
                    <div class="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 bg-black/50 text-white text-[10px] font-bold transition-opacity cursor-default">${seg.ratio}%</div>
                </div>
            `).join('');
            
            const segmentLegend = data.businessDNA.segments.map(seg => `
                <div class="flex items-center gap-1.5">
                    <span class="w-3 h-3 rounded shadow-sm" style="background-color: ${seg.bg};"></span>
                    <span class="text-xs text-stone-600 font-medium">${seg.label} ${seg.ratio}%</span>
                </div>
            `).join('');

            return `
                <section class="bg-white rounded-xl shadow-sm border border-stone-200 p-6 mb-6">
                    ${renderSectionIntro('3. 비즈니스 DNA 및 기술 해자 (Moat)', '현재 회사의 주력 매출 구조와 미래를 책임질 성장 동력, 그리고 경쟁사가 쉽게 모방할 수 없는 절대적 경쟁 우위를 분석합니다.')}
                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        
                        <!-- 포트폴리오 비중 & 먹거리 -->
                        <div class="lg:col-span-2 flex flex-col gap-4">
                            <div class="bg-stone-50 p-4.5 rounded-lg border border-stone-100 shadow-sm">
                                <h4 class="text-sm font-bold text-stone-800 mb-3 flex items-center gap-2"><span class="text-base">📊</span> 2026 사업 분야별 매출 비중 추정</h4>
                                <div class="w-full h-6 rounded-full overflow-hidden flex mb-3 shadow-inner bg-stone-200">
                                    ${segmentHtml}
                                </div>
                                <div class="flex flex-wrap gap-4 px-1">
                                    ${segmentLegend}
                                </div>
                            </div>
                            
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div class="bg-white p-5 rounded-lg border border-stone-200 shadow-sm border-l-4 border-l-stone-400">
                                    <div class="text-[10px] font-bold text-stone-400 uppercase tracking-wider mb-1">Current Cash Cow</div>
                                    <h5 class="text-sm font-bold text-stone-800 mb-2 flex items-center gap-1.5"><span class="text-lg">💰</span> 주요 캐시카우</h5>
                                    <p class="text-xs text-stone-600 leading-relaxed">${data.businessDNA.cashCow}</p>
                                </div>
                                <div class="bg-white p-5 rounded-lg border border-stone-200 shadow-sm border-l-4 border-l-${data.theme}-500">
                                    <div class="text-[10px] font-bold text-${data.theme}-400 uppercase tracking-wider mb-1">Next Big Thing</div>
                                    <h5 class="text-sm font-bold text-stone-800 mb-2 flex items-center gap-1.5"><span class="text-lg">🚀</span> 미래 먹거리</h5>
                                    <p class="text-xs text-stone-600 leading-relaxed">${data.businessDNA.future}</p>
                                </div>
                            </div>
                        </div>

                        <!-- 기술 해자 -->
                        <div class="bg-${data.theme}-900 p-6 rounded-lg text-white shadow-md relative overflow-hidden flex flex-col justify-center border border-${data.theme}-800">
                            <div class="absolute -right-4 -bottom-6 text-7xl opacity-10 grayscale">🏰</div>
                            <h4 class="text-sm font-bold text-${data.theme}-200 mb-3 flex items-center gap-2">
                                <span class="text-xl">🏰</span> 핵심 기술 해자 (Economic Moat)
                            </h4>
                            <div class="border-b border-${data.theme}-700/50 mb-4"></div>
                            <p class="text-sm text-stone-100 leading-relaxed relative z-10 font-medium">
                                ${data.businessDNA.moat}
                            </p>
                        </div>

                    </div>
                </section>
            `;
        }

        // 5. Competitiveness Grid
        function buildCompetitiveness(data) {
            const cards = data.competitiveness.map(comp => `
                <div class="bg-white p-4.5 rounded-lg border border-stone-200 hover:border-${data.theme}-400 transition-colors shadow-sm h-full">
                    <div class="text-2xl mb-2.5">${comp.icon}</div>
                    <h4 class="font-bold text-stone-800 text-sm mb-2">${comp.title}</h4>
                    <p class="text-xs text-stone-600 leading-relaxed">${comp.desc}</p>
                </div>
            `).join('');

            return `
                <section class="bg-stone-50 rounded-xl p-6 mb-6 border border-stone-200">
                    ${renderSectionIntro('4. 중장기 핵심 모멘텀', '단기 실적을 넘어 기업의 밸류에이션 리레이팅(재평가)을 이끌어낼 구조적 성장 동력입니다.')}
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">${cards}</div>
                </section>
            `;
        }

        // 6. Timeline
        function buildTimeline(data) {
            const items = data.timeline.map(t => `
                <div class="timeline-item relative pl-5 pb-5 border-l-2 border-stone-300 text-${data.theme}-600 last:pb-0 last:border-transparent">
                    <div class="font-bold text-xs mb-1">${t.date}</div>
                    <div class="text-xs text-stone-700 bg-white p-3 rounded border border-stone-100 shadow-sm">${t.text}</div>
                </div>
            `).join('');

            return `
                <section class="bg-white rounded-xl shadow-sm border border-stone-200 p-6 mb-6">
                    ${renderSectionIntro('5. 주요 이슈 타임라인', '최근 주요 경영 이벤트 및 외부 규제/환경 변화에 대한 기업의 전략적 대응 흐름입니다.')}
                    <div class="ml-2 mt-5">${items}</div>
                </section>
            `;
        }

        // 7. Final Strategy
        function buildStrategy(data) {
            const points = data.strategy.points.map(p => `
                <li class="mb-2.5 pl-4 relative text-sm leading-relaxed text-stone-300">
                    <span class="absolute left-0 top-1.5 w-1.5 h-1.5 rounded-full bg-${data.theme}-400"></span>
                    ${p.replace(/투자 포인트:|리스크:|액션:|추가 업사이드:/g, match => `<strong class="text-white">${match}</strong>`)}
                </li>
            `).join('');

            return `
                <section class="bg-stone-900 rounded-xl shadow-lg p-6 mb-6 border-t-4 border-${data.theme}-500">
                    <h2 class="text-lg font-bold text-white mb-4 flex items-center gap-2"><span class="text-xl">💡</span> 6. 2026 투자 전략 총평</h2>
                    <div class="bg-stone-800 rounded-lg p-4 mb-5 text-center border border-stone-700">
                        <strong class="text-lg md:text-xl text-${data.theme}-300 font-bold">"${data.strategy.outlook}"</strong>
                    </div>
                    <ul class="pl-1">${points}</ul>
                </section>
            `;
        }

        // Core Rendering Logic
        function renderChart(data) {
            const ctx = document.getElementById('finChart');
            if(!ctx) return;
            if (currentChart) currentChart.destroy();

            const colors = colorMap[data.theme];

            currentChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: data.financials.labels,
                    datasets: [
                        { type: 'bar', label: '매출액(조원)', data: data.financials.revenue, backgroundColor: 'rgba(168, 162, 158, 0.3)', borderColor: 'rgb(168, 162, 158)', borderWidth: 1, yAxisID: 'y' },
                        { type: 'line', label: '영업이익(조원)', data: data.financials.profit, backgroundColor: colors.border, borderColor: colors.border, borderWidth: 3, pointBackgroundColor: '#fff', pointBorderColor: colors.border, pointRadius: 4, tension: 0.3, yAxisID: 'y1' }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    plugins: { 
                        legend: { position: 'top', labels: { usePointStyle: true, boxWidth: 6, font: { family: 'Pretendard', size: 11 } } }, 
                        tooltip: { backgroundColor: 'rgba(28, 25, 23, 0.9)', padding: 10, titleFont: { family: 'Pretendard' }, bodyFont: { family: 'Pretendard' } } 
                    },
                    scales: {
                        x: { grid: { display: false }, ticks: { font: { family: 'Pretendard', size: 10 } } },
                        y: { type: 'linear', display: true, position: 'left', title: { display: true, text: '매출', font: { family: 'Pretendard', size: 10 } }, grid: { color: 'rgba(231, 229, 228, 0.6)' }, ticks: { font: { family: 'Pretendard', size: 10 } } },
                        y1: { type: 'linear', display: true, position: 'right', title: { display: true, text: '이익', font: { family: 'Pretendard', size: 10 } }, grid: { drawOnChartArea: false }, ticks: { font: { family: 'Pretendard', size: 10 } } }
                    }
                }
            });
        }

        function loadCompany(companyId) {
            const data = db[companyId];
            if(!data) return;

            document.querySelectorAll('.tab-btn').forEach(btn => {
                if (btn.getAttribute('data-target') === companyId) {
                    btn.className = `tab-btn px-4 py-2 text-sm font-medium rounded-md transition-all bg-white shadow-sm border-b-2 text-${data.theme}-700 border-${data.theme}-600`;
                } else {
                    btn.className = `tab-btn px-4 py-2 text-sm font-medium rounded-md transition-all text-stone-600 hover:text-stone-900 bg-transparent border-b-2 border-transparent`;
                }
            });

            const container = document.getElementById('app-container');
            container.classList.remove('fade-enter');
            void container.offsetWidth; 

            container.innerHTML = `
                ${buildHeader(data)}
                ${buildFinancials(data)}
                ${buildValueChain(data)}
                ${buildBusinessDNA(data)}
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    ${buildCompetitiveness(data)}
                    ${buildTimeline(data)}
                </div>
                ${buildStrategy(data)}
            `;

            container.classList.add('fade-enter');
            renderChart(data);
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('nav-tabs').addEventListener('click', (e) => {
                if(e.target.classList.contains('tab-btn')) loadCompany(e.target.getAttribute('data-target'));
            });
            loadCompany('hyundai');
        });
    </script>
</body>
</html>
